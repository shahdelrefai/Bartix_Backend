# Local development infrastructure for the Bartrix backend.
# Usage: docker compose up -d   (then run: dotnet run --project src/Bartrix.Api)
services:
  postgres:
    image: postgres:16-alpine
    container_name: bartrix-postgres
    environment:
      POSTGRES_DB: bartrix
      POSTGRES_USER: bartrix
      POSTGRES_PASSWORD: bartrix
    ports:
      - "5432:5432"
    volumes:
      - bartrix-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bartrix"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: bartrix-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - bartrix-miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bartrix-pgdata:
  bartrix-miniodata:
